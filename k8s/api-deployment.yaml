apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpc-api
  namespace: lux-mpc
  labels:
    app: mpc-api
    app.kubernetes.io/part-of: lux-mpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mpc-api
  template:
    metadata:
      labels:
        app: mpc-api
        app.kubernetes.io/part-of: lux-mpc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: registry-hanzo
      containers:
        - name: mpc-api
          image: ghcr.io/luxfi/mpc-api:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - api
            - --db
            - $(DATABASE_URL)
            - --listen
            - ":8081"
            - --jwt-secret
            - $(JWT_SECRET)
            - --cluster-url
            - http://mpc-node-0.mpc-node-headless.lux-mpc.svc:9800
          ports:
            - containerPort: 8081
              name: api
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mpc-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mpc-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50Mi
