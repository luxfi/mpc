# MPC Secrets — sourced from Hanzo KMS via KMSSecret CRD.
# NEVER store plaintext credentials in this file.
apiVersion: kms.hanzo.ai/v1alpha1
kind: KMSSecret
metadata:
  name: mpc-secrets
  namespace: lux-mpc
  labels:
    app.kubernetes.io/part-of: lux-mpc
spec:
  kmsProjectSlug: lux-mpc
  kmsEnvironmentSlug: prod
  secretPath: /mpc
  targetSecretName: mpc-secrets
  machineIdentityRef:
    name: mpc-kms-credentials
    namespace: lux-mpc
  secretKeys:
    - kmsKey: postgres-password
      secretKey: postgres-password
    - kmsKey: jwt-secret
      secretKey: jwt-secret
    - kmsKey: database-url
      secretKey: DATABASE_URL
    - kmsKey: kv-url
      secretKey: KV_URL
    - kmsKey: zapdb-password
      secretKey: ZAPDB_PASSWORD
